# templates/blueprint-schema.yaml
# Full example of a valid blueprint.yaml showing all fields and their types.
# Agents: read this to understand the expected structure before editing the blueprint.

meta:
  project: "Example App"                    # required: string
  created_at: "2026-04-03T14:30:00Z"       # required: ISO 8601 timestamp
  updated_at: "2026-04-03T14:30:00Z"       # managed by 'blueprint.py stamp'
  version: 1                                # managed by 'blueprint.py stamp'

tech_stack:                                 # optional section
  language: "TypeScript"
  framework: "NestJS"
  runtime: "Node.js 20"
  package_manager: "npm"
  test_framework: "Jest"
  key_dependencies:
    - name: "@nestjs/core"
      version: "10.x"
      purpose: "Application framework"

bounded_contexts:                           # optional section, list
  - name: "Ordering"                        # required: string, unique across contexts
    description: "Handles order lifecycle"  # optional: string
    aggregates:
      - name: "Order"                       # required: string
        root_entity: "Order"                # optional: string (defaults to name)
        entities: ["OrderLine"]             # optional: list of strings
        value_objects: ["Money", "OrderId"] # optional: list of strings
        commands:
          - name: "PlaceOrder"              # required: string
            actor: "Customer"              # optional: who issues this command
            feature_files:                  # required: list (can be empty)
              - "order-placement.feature"   # filename relative to .storyline/features/
            rejection_reasons:              # optional: domain rejections (not technical errors)
              - "InsufficientStock"
              - "CreditLimitExceeded"
        events:
          - name: "OrderPlaced"             # required: string, unique across ALL aggregates
            payload_fields:                 # required: list
              - "orderId"
              - "customerId"
        invariants:                         # optional: list of strings
          - "Order total equals sum of line item totals"
    sagas:                                  # optional: stateful multi-step workflows (distinct from policies)
      - name: "OrderFulfillmentSaga"        # required: string
        description: "Coordinates payment, inventory, and shipping" # optional
        steps:
          - on: "OrderPlaced"               # required: event that triggers this step
            do: "RequestPayment"            # required: command to issue
            context: "Payment"             # optional: which bounded context handles this
          - on: "PaymentReceived"
            do: "ReserveInventory"
            context: "Inventory"
        compensation:                       # optional: commands to issue on rollback
          - "CancelOrder"
          - "RefundPayment"
    policies:                               # optional: list
      - name: "RequestPaymentOnOrderPlaced" # required: string
        triggered_by: "OrderPlaced"         # required: must reference event in same context
        issues_command: "RequestPayment"    # required: must reference command in any context
    read_models:                            # optional: list
      - name: "OrderSummary"               # required: string
        built_from: ["OrderPlaced"]         # required: must reference existing events
        used_by: "Customer dashboard"       # required: string
    external_systems:                       # optional: list
      - name: "EmailService"
        events_consumed: ["OrderConfirmed"]
        events_produced: ["EmailDelivered"]
    domain_services:                        # optional: list
      - name: "PricingService"
        description: "Calculates totals"
    relationships:                          # optional: list
      - type: "customer-supplier"           # required: one of: shared-kernel, customer-supplier,
                                            #   conformist, anti-corruption-layer, published-language,
                                            #   open-host-service, separate-ways
        target: "Payment"                   # required: must reference existing bounded context
        pattern: "Published Language"       # optional: string
        via: "OrderPlaced event"            # optional: string

glossary:                                   # optional section, map
  Order:                                    # key: term name
    definitions:                            # required: list
      - context: "Ordering"                 # required: existing context name or "Shared Kernel"
        meaning: "A customer's intent to purchase" # required: string

gaps:                                       # optional section, list
  - id: "GAP-001"                           # required: auto-generated by add-gap
    description: "Missing feature files"    # required: string
    severity: "critical"                    # required: critical | important | nice_to_know
    affects: ["Payment"]                    # required: list of existing context names

questions:                                  # optional section, list
  - id: "Q-001"                             # required: auto-generated by add-question
    question: "What payment methods?"       # required: string
    severity: "critical"                    # required: critical | important | nice_to_know
    raised_during: "Three Amigos"           # required: string (phase name)
    affects: ["Payment"]                    # required: list of existing context names
    status: "open"                          # required: open | resolved | deferred
    answer: "Card and bank transfer only"   # optional: the decision — fill in when status → resolved
    decided_at: "2026-04-05"               # optional: when the decision was made
