feature: "Blueprint Size Management & Enforced Housekeeping"
story: "As the blueprint grows with real projects (2500+ lines), agents need smarter ways to read it and housekeeping must be structurally enforced rather than relying on agent discipline"
session_date: "2026-04-05"
participants:
  - "Product Amigo (AI-facilitated)"
  - "Developer Amigo (with Claude Code docs research)"
  - "Testing Amigo"

codebase_context:
  existing_models:
    - "Blueprint (scripts/blueprint.py — CLI with validate, stamp, add-* commands)"
    - "PostToolUse hook (hooks/hooks.json — auto-validates on Edit/Write to blueprint.yaml)"
    - "SubagentStop hook (hooks/hooks.json — checks persona memory updates)"
    - "SessionStart hook (hooks/hooks.json — shows blueprint status)"
  related_features:
    - "blueprint-management.feature"
    - "orchestration.feature"
  technical_notes: |
    - Blueprint for this plugin is 690 lines; real project (Liminal) is 2501 lines
    - 9 blueprint reads per full pipeline run = 22,500 lines of input tokens at 2500 lines
    - PostToolUse hook only triggers on Edit|Write, NOT on Bash (misses all `blueprint add-*` CLI calls)
    - Claude Code hooks can warn but never block — PostToolUse runs AFTER the tool
    - No PreCommit or PhaseComplete hook exists in Claude Code
    - CLI commands (add-*) do internal validation but have no external safety net
    - Agent-by-agent analysis shows only Sticky Storm and Doctor Context need full blueprint;
      80% of agent invocations can work with a summary (20-40% of content)

rules:
  - id: "R1"
    description: "Blueprint stays single-file; agents read via `blueprint summary` (compact overview) or `blueprint view --context X` (detail per context)"
    priority: "must-have"
    examples:
      - id: "R1-E1"
        name: "Agent reads summary for orientation"
        context: "The Foreman starts a pipeline run on a project with a 2500-line blueprint"
        action: "Foreman runs `blueprint summary`"
        outcome: "Gets ~80-120 lines: meta, tech_stack, per-context name + description + aggregate names + counts, relationships, glossary terms"
        type: "happy-path"
      - id: "R1-E2"
        name: "Agent reads context view for targeted work"
        context: "Mister Gherkin needs to write scenarios for the Payment context"
        action: "Runs `blueprint view --context Payment`"
        outcome: "Gets full Payment context (~300-500 lines) + relationship target names + glossary terms for Payment"
        type: "happy-path"
      - id: "R1-E3"
        name: "Cross-context agent reads full blueprint"
        context: "Sticky Storm needs to check event uniqueness across all contexts"
        action: "Reads full .storyline/blueprint.yaml"
        outcome: "Gets all events across all aggregates to enforce uniqueness invariant"
        type: "happy-path"
      - id: "R1-E4"
        name: "Summary for a fresh project with one context"
        context: "Project just initialized with a single bounded context"
        action: "Runs `blueprint summary`"
        outcome: "Summary is ~20 lines — minimal but structurally identical to large projects"
        type: "boundary"
      - id: "R1-E5"
        name: "View for a non-existent context"
        context: "Agent requests view for a context that doesn't exist"
        action: "Runs `blueprint view --context NonExistent`"
        outcome: "Clear error message listing available context names"
        type: "sad-path"

  - id: "R2"
    description: "Every pipeline phase ends with a housekeeping todo step that runs `blueprint housekeeping`"
    priority: "must-have"
    examples:
      - id: "R2-E1"
        name: "Three Amigos ends with housekeeping"
        context: "Three Amigos session produces an example-map.yaml and agents may have edited the blueprint"
        action: "Last todo item runs `blueprint housekeeping`"
        outcome: "Blueprint is validated, stamped if valid, and the user sees confirmation in the todo list"
        type: "happy-path"
      - id: "R2-E2"
        name: "Housekeeping finds validation errors"
        context: "Agent made edits during the phase that introduced a referential integrity error"
        action: "Housekeeping runs `blueprint validate`"
        outcome: "Errors are reported; stamp is skipped; agent is prompted to fix errors before proceeding"
        type: "sad-path"
      - id: "R2-E3"
        name: "Housekeeping on a phase that didn't touch the blueprint"
        context: "Three Amigos quick scan only produced an example-map, no blueprint edits"
        action: "Housekeeping runs validate + stamp"
        outcome: "Validate passes, stamp detects no changes needed, reports 'Blueprint already up to date'"
        type: "boundary"
      - id: "R2-E4"
        name: "Housekeeping is idempotent"
        context: "Agent accidentally runs housekeeping twice"
        action: "Second `blueprint housekeeping` call"
        outcome: "No-op — validate passes, version already current, no cleanup needed"
        type: "boundary"

  - id: "R3"
    description: "PostToolUse hook catches Bash `blueprint` calls for auto-validation, not just Edit/Write"
    priority: "must-have"
    examples:
      - id: "R3-E1"
        name: "CLI add-event triggers auto-validation"
        context: "Agent runs `blueprint add-event --context Payment --aggregate Invoice --name InvoiceSent`"
        action: "PostToolUse hook detects Bash call containing 'blueprint'"
        outcome: "Auto-validation runs on the full blueprint file, result shown to agent"
        type: "happy-path"
      - id: "R3-E2"
        name: "Non-blueprint Bash calls are not affected"
        context: "Agent runs `git status` or `python3 scripts/test_blueprint.py`"
        action: "PostToolUse hook checks if command is a blueprint mutation"
        outcome: "Hook does nothing — only `blueprint add-*` and `blueprint stamp` trigger validation"
        type: "boundary"
      - id: "R3-E3"
        name: "Blueprint command in a chained command"
        context: "Agent runs `cd /path && blueprint add-context Payment`"
        action: "PostToolUse hook parses the Bash command string"
        outcome: "Detects 'blueprint add-' in the chain, triggers validation"
        type: "boundary"

  - id: "R4"
    description: "Workbench cleanup is never automatic — requires explicit `blueprint housekeeping --cleanup` and refuses if uncommitted changes exist"
    priority: "should-have"
    examples:
      - id: "R4-E1"
        name: "Cleanup after committing phase artifacts"
        context: "Mister Gherkin completed, feature files committed, example-map.yaml still in workbench"
        action: "Agent runs `blueprint housekeeping --cleanup`"
        outcome: "Checks git status of workbench/, confirms all committed, removes consumed artifacts"
        type: "happy-path"
      - id: "R4-E2"
        name: "Cleanup refused with uncommitted changes"
        context: "Agent tries to clean up but example-map.yaml has uncommitted modifications"
        action: "Runs `blueprint housekeeping --cleanup`"
        outcome: "Refuses with message: 'Uncommitted changes in workbench/ — commit first, then clean up'"
        type: "sad-path"
      - id: "R4-E3"
        name: "User pauses 3 days between phases"
        context: "Three Amigos completed Monday, Mister Gherkin starts Thursday"
        action: "Mister Gherkin reads example-map.yaml from workbench"
        outcome: "File is still there — no automatic cleanup happened between sessions"
        type: "happy-path"
      - id: "R4-E4"
        name: "Cleanup with --phase flag"
        context: "Three Amigos completed, user wants to clean up only Three Amigos artifacts"
        action: "Runs `blueprint housekeeping --cleanup --phase three-amigos`"
        outcome: "Removes amigo-notes/ directory, keeps example-map.yaml (needed by next phase)"
        type: "happy-path"

  - id: "R5"
    description: "Estimation reports move from workbench/ to plans/ — they are stakeholder artifacts, not transient working documents"
    priority: "should-have"
    examples:
      - id: "R5-E1"
        name: "Appraiser writes report to plans/"
        context: "The Appraiser completes a triangulated estimate"
        action: "Writes estimation-report.md"
        outcome: "File is saved to .storyline/plans/YYYY-MM-DD-estimation-<feature>.md, not workbench/"
        type: "happy-path"

  - id: "R6"
    description: "Skills use a decision tree for blueprint reads: summary by default, view for targeted work, full read only for cross-context agents"
    priority: "must-have"
    examples:
      - id: "R6-E1"
        name: "The Foreman uses summary"
        context: "Foreman starts and needs to detect project state"
        action: "Reads `blueprint summary`"
        outcome: "Gets enough context to decide which phase to run without reading 2500 lines"
        type: "happy-path"
      - id: "R6-E2"
        name: "Developer Amigo uses context view"
        context: "Developer Amigo is analyzing a specific feature in the Payment context"
        action: "Reads summary first, then `blueprint view --context Payment`"
        outcome: "Gets Payment details + relationship targets + relevant glossary"
        type: "happy-path"
      - id: "R6-E3"
        name: "Doctor Context reads full blueprint"
        context: "Doctor Context needs to refine boundaries across all contexts"
        action: "Reads full .storyline/blueprint.yaml"
        outcome: "Gets complete picture — this is one of ~2 agents that needs everything"
        type: "happy-path"

questions:
  - id: "Q1"
    question: "What exactly goes in the blueprint summary? This is the core design decision — too little and agents miss context, too much and we don't save tokens."
    why_it_matters: "The summary IS the 'minimum viable mental model' for 80% of agent invocations. Getting it wrong means either wasted tokens or wrong decisions."
    who_can_answer: "Product + Developer together — needs both domain knowledge and technical constraints"
    best_guess: "Context names + descriptions + aggregate names + relationship overview + glossary terms. No commands, events, policies, gaps, or questions."
    severity: "critical"

  - id: "Q2"
    question: "Should the PostToolUse validation gap (Bash calls) be fixed BEFORE implementing summary/view?"
    why_it_matters: "Testing Amigo argues views without watertight validation is riskier than the current system. Developer Amigo notes CLI commands already validate internally."
    who_can_answer: "Developer + Testing — technical risk assessment"
    best_guess: "Fix in parallel — the validation gap fix is small (hook update), summary/view is bigger (CLI commands + skill rewrites)"
    severity: "important"

  - id: "Q3"
    question: "How do we test whether a summary provides sufficient information for a specific agent task?"
    why_it_matters: "Without testing, we're guessing what agents need. A summary that causes wrong assumptions is worse than reading the full file."
    who_can_answer: "Testing Amigo — concrete test scenarios needed"
    best_guess: "Run concrete scenarios: give Sticky Storm only a summary, see if it adds a duplicate event name. Give Mister Gherkin only a summary, see if it misses a command tag."
    severity: "important"

  - id: "Q4"
    question: "Should a research agent (finds existing packages/libraries before building) be part of Discovery or a separate pipeline step?"
    why_it_matters: "Claude Code defaults to building from scratch. Real projects benefit from wiring well-maintained libraries together."
    who_can_answer: "Product — pipeline design decision"
    best_guess: "Part of the Developer Amigo's analysis in Three Amigos, with tech_stack as input for search queries"
    severity: "nice_to_know"

glossary_candidates:
  - term: "Blueprint Summary"
    context: "BlueprintManagement"
    meaning: "A compact CLI-generated overview of the blueprint (~80-120 lines) showing meta, tech stack, context names with descriptions, aggregate names, relationships, and glossary — used as default read for most agents"
  - term: "Blueprint View"
    context: "BlueprintManagement"
    meaning: "A CLI-generated filtered view of a single bounded context including its full detail plus relationship targets and relevant glossary terms — used for targeted agent work"
  - term: "Housekeeping"
    context: "Orchestration"
    meaning: "The mandatory final step of every pipeline phase: validate blueprint, stamp if valid, optionally clean up consumed workbench artifacts. Enforced via todo steps and PostToolUse hooks."
  - term: "Decision Tree"
    context: "Orchestration"
    meaning: "The convention for how skills read the blueprint: summary by default, view for targeted work, full read only for cross-context agents (Sticky Storm, Doctor Context)"

risks:
  technical:
    - "PostToolUse hook for Bash calls requires fragile string-matching on command content — chained commands, aliases, or variable expansion could bypass detection"
    - "Summary creates a new failure mode: agents working with incomplete data making wrong assumptions that validation only catches after mutation"
    - "Edit operations still require reading the full file for exact string matching — token savings apply only to the orientation phase, not the edit phase"
  scope:
    - "Rewriting 7 skills + 9 agents for summary-first convention is the largest work item — Developer estimates 2 days"
    - "Cleanup policy per phase requires domain knowledge mapping (which artifacts belong to which phase) that doesn't exist yet"
  knowledge_gaps:
    - "Q1 (summary contents) must be resolved before implementation — it determines the entire design"
    - "Real token savings are debated: Developer says 70-85%, Testing says 40-60% when accounting for edit costs"
