meta:
  project: Storyline
  created_at: '2026-04-04'
  updated_at: '2026-04-06T18:53:07.234Z'
  version: 45
tech_stack:
  language: "TypeScript, Markdown, Bash, YAML"
  framework: "Claude Code Plugin SDK"
  runtime: "Node.js 18+ via tsx (ESM), Claude Code CLI (claude.ai/code)"
  package_manager: "npm"
  test_framework: "node:test (scripts/test-blueprint.ts, 60 tests;
    scripts/test-changeset.ts, 22 tests; scripts/test-scaffold.ts, 36 tests)"
  key_dependencies:
    - name: "yaml"
      version: "^2.7.0"
      purpose: "YAML parsing and editing for blueprint.yaml"
    - name: "tsx"
      version: "^4.19.0"
      purpose: "TypeScript execution via ESM loader for the blueprint CLI"
bounded_contexts:
  - name: "Orchestration"
    description: "Pipeline entry point, phase coordination, build direction,
      estimation, and status reporting. The Foreman skill and its subagents
      (foreman inspector, surveyor) manage pipeline flow. Includes hooks
      (SessionStart, PostToolUse, SubagentStop), CLI wrappers in bin/, and The
      Appraiser for estimation."
    aggregates:
      - name: "PipelineSession"
        root_entity: "PipelineSession"
        entities: []
        value_objects:
          - "PipelinePhase"
          - "BuildChoice"
          - "EstimationReport"
        commands:
          - name: "StartPipeline"
            feature_files:
              - "orchestration.feature"
          - name: "DetectProjectState"
            feature_files:
              - "orchestration.feature"
          - name: "PresentBuildChoice"
            feature_files:
              - "orchestration.feature"
          - name: "ReportStatus"
            feature_files:
              - "orchestration.feature"
          - name: "DispatchSurveyor"
            feature_files:
              - "orchestration.feature"
          - name: "DispatchAppraiser"
            feature_files:
              - "orchestration.feature"
          - name: "RunScenarioRefinement"
            feature_files:
              - "orchestration.feature"
          - name: "DispatchSecurityAudit"
            feature_files:
              - "orchestration.feature"
          - name: RunHousekeeping
            feature_files:
              - housekeeping.feature
          - name: StartTechnicalTask
            feature_files:
              - technical-task-entry-point.feature
          - name: IdentifyMinorTweak
            feature_files:
              - lightweight-tweak-path.feature
          - name: ScanTweakImplications
            feature_files:
              - lightweight-tweak-path.feature
          - name: ExecuteTweakPath
            feature_files:
              - lightweight-tweak-path.feature
        events:
          - name: "PipelineStarted"
            payload_fields:
              - "projectName"
              - "detectedState"
          - name: "ProjectStateDetected"
            payload_fields:
              - "hasBlueprint"
              - "hasSourceCode"
              - "isStale"
          - name: "BuildChoicePresented"
            payload_fields:
              - "taskCount"
              - "recommendation"
              - "options"
          - name: "SurveyorDispatched"
            payload_fields:
              - "mode"
              - "targetProject"
          - name: "PhaseTransitioned"
            payload_fields:
              - "fromPhase"
              - "toPhase"
          - name: "AppraiserDispatched"
            payload_fields:
              - "planFile"
              - "audience"
              - "detailLevel"
          - name: "ScenarioRefinementCompleted"
            payload_fields:
              - "featureFilesReviewed"
              - "refinementsApplied"
          - name: "SecurityAuditCompleted"
            payload_fields:
              - "criticalIssues"
              - "findings"
          - name: MinorTweakIdentified
            payload_fields:
              - sessionId
              - changeDescription
              - rationale
              - affectedCommand
          - name: TweakClassificationDeferred
            payload_fields:
              - sessionId
              - clarificationQuestion
          - name: TweakRoutedToFullPipeline
            payload_fields:
              - sessionId
              - reason
          - name: TweakImplicationScanCompleted
            payload_fields:
              - sessionId
              - affectedFeatureFiles
              - affectedScenarioNames
              - contextCount
          - name: TweakBlockedByCrossContextImplications
            payload_fields:
              - sessionId
              - affectedContexts
          - name: TweakPathExecuted
            payload_fields:
              - sessionId
              - executionMode
              - artifactsReconciled
        invariants:
          - "Exactly one pipeline phase may be in_progress at a time"
          - "The Foreman never explores the codebase directly — reads the
            blueprint only"
          - "Blueprint must be validated and stamped before any commit that
            touches the blueprint — code-only commits on the lightweight tweak
            path are exempt"
    policies:
      - name: "DispatchSurveyorOnMissingBlueprint"
        triggered_by: "ProjectStateDetected"
        issues_command: "DispatchSurveyor"
      - name: "StartThreeAmigosAfterSurvey"
        triggered_by: "PhaseTransitioned"
        issues_command: "StartPipeline"
      - name: InitiateImplicationScanOnConfirmation
        triggered_by: MinorTweakIdentified
        issues_command: ScanTweakImplications
        session_id: 02c128d0-31a3-4c72-87c9-ee54c45557dc
      - name: RouteToFullPipelineOnCrossContextBlock
        triggered_by: TweakBlockedByCrossContextImplications
        issues_command: StartPipeline
        session_id: 02c128d0-31a3-4c72-87c9-ee54c45557dc
    read_models: []
    external_systems: []
    domain_services: []
    relationships:
      - type: "customer-supplier"
        target: "Discovery"
        pattern: "Published Language"
        via: "PhaseTransitioned event triggers Three Amigos"
      - type: "customer-supplier"
        target: "BlueprintManagement"
        pattern: "Published Language"
        via: "All phases read/write blueprint.yaml through the CLI"

  - name: "Discovery"
    description: "Feature exploration through Three Amigos sessions. Product,
      Developer, Testing, and optionally Frontend and Security perspectives
      collaborate via shared notes (workbench/amigo-notes/) to produce an
      Example Map with rules, examples, questions, and MoSCoW priorities. Crew
      roster in agent prompts enables awareness of all participants. Contextual
      questions during agent wait times."
    aggregates:
      - name: "DiscoverySession"
        root_entity: "DiscoverySession"
        entities:
          - "ExampleMap"
          - "AmigoNotes"
        value_objects:
          - "BusinessRule"
          - "Example"
          - "MoSCoWPriority"
        commands:
          - name: "StartDiscoverySession"
            feature_files:
              - "discovery.feature"
          - name: "RunQuickScan"
            feature_files:
              - "discovery.feature"
          - name: "RunFullSession"
            feature_files:
              - "discovery.feature"
          - name: "CaptureBacklogItem"
            feature_files:
              - "discovery.feature"
          - name: RunTechnicalBrief
            feature_files:
              - technical-task-entry-point.feature
        events:
          - name: "DiscoverySessionStarted"
            payload_fields:
              - "featureDescription"
              - "mode"
          - name: "ExampleMapProduced"
            payload_fields:
              - "rules"
              - "examples"
              - "questions"
          - name: "BacklogItemCaptured"
            payload_fields:
              - "title"
              - "source"
        invariants:
          - "Discovery sessions read the blueprint as context, never explore
            codebase directly"
          - "Full session mode dispatches parallel persona agents (3-5 depending
            on crew roster) with persistent memory"
          - "Quick scan mode uses a single AI embodying all three perspectives"
          - "Frontend Amigo is added to crew when project has a frontend
            framework in tech_stack"
          - "Security Amigo is added when feature touches auth, user input,
            sensitive data, or external APIs"
          - "Each agent prompt includes the full crew roster so agents know who
            else is participating"
      - name: "PersonaMemory"
        root_entity: "PersonaMemory"
        entities: []
        value_objects:
          - "PersonaType"
        commands:
          - name: "UpdatePersonaMemory"
            feature_files:
              - "discovery.feature"
        events:
          - name: "PersonaMemoryUpdated"
            payload_fields:
              - "personaType"
              - "topicsLearned"
        invariants:
          - "Memory is organized by topic, not by date"
          - "Memory files live at .storyline/personas/<name>.md for all five
            amigo types"
          - "SubagentStop hook warns if persona finishes without updating memory"
    policies:
      - name: "ProduceExampleMapAfterDiscovery"
        triggered_by: "DiscoverySessionStarted"
        issues_command: "RunQuickScan"
    read_models: []
    external_systems: []
    domain_services: []
    relationships:
      - type: "customer-supplier"
        target: "Specification"
        pattern: "Published Language"
        via: "ExampleMapProduced feeds Mister Gherkin"
      - type: "customer-supplier"
        target: "Orchestration"
        pattern: "Published Language"
        via: "The Foreman dispatches discovery and receives completion"

  - name: "Specification"
    description: "Gherkin scenario formalization. Mister Gherkin takes Example Maps
      from discovery and produces structured .feature files with declarative
      Given/When/Then scenarios linked to commands in the blueprint."
    aggregates:
      - name: "FeatureFile"
        root_entity: "FeatureFile"
        entities:
          - "Scenario"
          - "Rule"
        value_objects:
          - "GherkinStep"
          - "ScenarioTag"
        commands:
          - name: "FormalizeScenarios"
            feature_files:
              - "specification.feature"
          - name: "LinkFeatureToCommand"
            feature_files:
              - "specification.feature"
          - name: "RefineScenarios"
            feature_files:
              - "specification.feature"
        events:
          - name: "ScenariosFormalized"
            payload_fields:
              - "featureFile"
              - "scenarioCount"
              - "rulesCount"
          - name: "FeatureLinkedToCommand"
            payload_fields:
              - "featureFile"
              - "contextName"
              - "commandName"
        invariants:
          - "Scenarios are written in declarative style — describe behavior, not
            UI clicks"
          - "Every scenario is grouped under a Rule: block"
          - "Feature files include @command:X tags for reverse traceability"
          - "Mister Gherkin never writes scenarios without a discovery loop
            first"
    policies: []
    read_models: []
    external_systems: []
    domain_services: []
    relationships:
      - type: "customer-supplier"
        target: "DomainModeling"
        pattern: "Published Language"
        via: "Feature files feed Sticky Storm for event discovery"
      - type: "customer-supplier"
        target: "Discovery"
        pattern: "Published Language"
        via: "Reads ExampleMap from .storyline/workbench/example-map.yaml"

  - name: "DomainModeling"
    description: "Event Storming (Sticky Storm agent) and DDD modeling (Doctor
      Context agent). Both are subagents dispatched by The Foreman, not
      standalone skills. They discover domain events from scenarios, refine
      bounded context boundaries, add invariants, relationships, and glossary
      terms to the blueprint."
    aggregates:
      - name: "EventStormSession"
        root_entity: "EventStormSession"
        entities: []
        value_objects:
          - "DomainEvent"
          - "Command"
          - "Policy"
          - "Aggregate"
        commands:
          - name: "DiscoverEventsFromScenarios"
            feature_files:
              - "domain-modeling.feature"
          - name: "RefineContextBoundaries"
            feature_files:
              - "domain-modeling.feature"
          - name: "AddInvariantsAndRelationships"
            feature_files:
              - "domain-modeling.feature"
          - name: "BuildGlossary"
            feature_files:
              - "domain-modeling.feature"
        events:
          - name: "EventsDiscovered"
            payload_fields:
              - "contextName"
              - "eventNames"
              - "commandNames"
          - name: "ContextBoundariesRefined"
            payload_fields:
              - "contextName"
              - "relationships"
              - "invariants"
          - name: "GlossaryTermAdded"
            payload_fields:
              - "term"
              - "context"
              - "meaning"
        invariants:
          - "Events and commands are discovered from scenarios, not from code"
          - "Doctor Context reads the blueprint as its patient, never explores
            the codebase"
          - "DDD patterns reference is available at references/ddd-patterns.md"
    policies: []
    read_models: []
    external_systems: []
    domain_services: []
    relationships:
      - type: "customer-supplier"
        target: "Implementation"
        pattern: "Published Language"
        via: "Refined blueprint feeds The Onion's implementation planning"
      - type: "customer-supplier"
        target: "Specification"
        pattern: "Published Language"
        via: "Reads .feature files to discover events"

  - name: "Implementation"
    description: "Outside-in TDD implementation. The Onion plans and executes
      implementation from acceptance tests inward. Plans are persistent dated
      files in .storyline/plans/. Includes scaffold.ts for code generation, The
      Foreman's Crew mode for amigo-based building, The Appraiser for
      triangulated estimation, and scenario refinement in the post-build flow."
    aggregates:
      - name: "ImplementationPlan"
        root_entity: "ImplementationPlan"
        entities:
          - "ImplementationTask"
        value_objects:
          - "TestLayer"
        commands:
          - name: "CreateImplementationPlan"
            feature_files:
              - "implementation.feature"
          - name: "ExecuteTask"
            feature_files:
              - "implementation.feature"
          - name: "ScaffoldFromBlueprint"
            feature_files:
              - "implementation.feature"
              - "scaffold.feature"
        events:
          - name: "ImplementationPlanCreated"
            payload_fields:
              - "taskCount"
              - "filesTouched"
          - name: "TaskCompleted"
            payload_fields:
              - "taskNumber"
              - "testsGreen"
          - name: "ScaffoldGenerated"
            payload_fields:
              - "language"
              - "contextsGenerated"
              - "aggregatesGenerated"
        invariants:
          - "Outside-in TDD: acceptance test first, then inner loop (unit test,
            implement, refactor)"
          - "Outer loop stays red while inner loop cycles"
          - "scaffold.ts supports TypeScript and Python code generation"
          - "Scaffold reads blueprint.yaml or legacy domain-model.json"
          - "Implementation plans are persistent dated files in
            .storyline/plans/YYYY-MM-DD-<feature>.md"
          - "The Appraiser produces triangulated estimates using PERT, WBS, and
            T-Shirt sizing"
          - "Post-build flow includes as-built survey, optional security audit,
            and scenario refinement by active amigos"
      - name: Changeset
        root_entity: Changeset
        entities: []
        value_objects: []
        commands:
          [
            { name: InitChangeset, feature_files: [ implementation.feature ] },
            { name: ValidateChangeset, feature_files: [ implementation.feature ] },
            {
                name: ApplyDomainModelDelta,
                feature_files: [ technical-brief.yaml ],
                spec_type: brief
              },
            {
                name: DiscardChangeset,
                feature_files: [ technical-brief.yaml ],
                spec_type: brief
              }
          ]
        events:
          [
            { name: ChangesetInitialised, payload_fields: [ id, title, blueprintVersion ] },
            { name: ChangesetValidated, payload_fields: [ id, errorCount, warningCount ] }
          ]
        invariants: []
    policies:
      - name: "HandOffToForemanAfterPlan"
        triggered_by: "ImplementationPlanCreated"
        issues_command: "PresentBuildChoice"
    read_models: []
    external_systems: []
    domain_services: []
    relationships:
      - type: "customer-supplier"
        target: "Orchestration"
        pattern: "Published Language"
        via: "The Onion hands off to The Foreman after writing the plan"
      - type: "customer-supplier"
        target: "BlueprintManagement"
        pattern: "Published Language"
        via: "Scaffold reads blueprint.yaml for code generation"

  - name: "BlueprintManagement"
    description: "Blueprint lifecycle management via the TypeScript CLI
      (scripts/blueprint.ts). Handles initialization, schema validation,
      referential integrity checks, version stamping, and structural mutations
      (add-context, add-aggregate, add-event, add-command, add-glossary,
      add-gap, add-question, archive). Also generates summary and context view
      outputs for agent consumption."
    aggregates:
      - name: "Blueprint"
        root_entity: "Blueprint"
        entities:
          - "BoundedContext"
          - "AggregateDefinition"
          - "EventDefinition"
          - "CommandDefinition"
          - "GapEntry"
          - "QuestionEntry"
          - "GlossaryEntry"
        value_objects:
          - "Severity"
          - "QuestionStatus"
          - "RelationshipType"
        commands:
          - name: "InitializeBlueprint"
            feature_files:
              - "blueprint-management.feature"
          - name: "ValidateBlueprint"
            feature_files:
              - "blueprint-management.feature"
          - name: "StampBlueprint"
            feature_files:
              - "blueprint-management.feature"
          - name: "AddContext"
            feature_files:
              - "blueprint-management.feature"
          - name: "AddAggregate"
            feature_files:
              - "blueprint-management.feature"
          - name: "AddEvent"
            feature_files:
              - "blueprint-management.feature"
          - name: "AddCommand"
            feature_files:
              - "blueprint-management.feature"
          - name: "AddGlossaryTerm"
            feature_files:
              - "blueprint-management.feature"
          - name: "AddGap"
            feature_files:
              - "blueprint-management.feature"
          - name: "AddQuestion"
            feature_files:
              - "blueprint-management.feature"
          - name: GenerateSummary
            feature_files:
              - blueprint-views.feature
          - name: GenerateContextView
            feature_files:
              - blueprint-views.feature
          - name: AddRelationship
            feature_files:
              - blueprint-cli-mutations.feature
          - name: AddInvariant
            feature_files:
              - blueprint-cli-mutations.feature
          - name: AddPolicy
            feature_files:
              - blueprint-cli-mutations.feature
          - name: ResolveQuestion
            feature_files:
              - blueprint-cli-mutations.feature
        events:
          - name: "BlueprintInitialized"
            payload_fields:
              - "projectName"
              - "createdAt"
          - name: "BlueprintValidated"
            payload_fields:
              - "errorCount"
              - "schemaErrors"
              - "referentialErrors"
              - "fileNotFoundErrors"
          - name: "BlueprintStamped"
            payload_fields:
              - "version"
              - "updatedAt"
          - name: "ContextAdded"
            payload_fields:
              - "contextName"
          - name: "AggregateAdded"
            payload_fields:
              - "contextName"
              - "aggregateName"
        invariants:
          - "Blueprint init refuses if blueprint.yaml already exists"
          - "Stamp validates before bumping version — never stamps an invalid
            blueprint"
          - "Event names must be unique across ALL aggregates in the entire
            blueprint"
          - "Policy triggered_by must reference an event in the same context"
          - "Policy issues_command must reference a command in any context"
          - "Relationship targets must reference existing bounded context names"
          - "Gap and question affects must reference existing context names"
          - "Glossary definition context must reference existing context or
            Shared Kernel"
          - "Feature files referenced in commands must exist on disk"
          - "CLI helpers use the yaml npm package for YAML parsing and writing"
          - "Init creates features/, workbench/, plans/, and backlog/
            subdirectories"
    policies: []
    read_models: []
    external_systems: []
    domain_services: []
    relationships:
      - type: "open-host-service"
        target: "Orchestration"
        pattern: "CLI interface"
        via: "bin/storyline wrapper provides the CLI that all skills invoke"

glossary:
  Blueprint:
    definitions:
      - context: "BlueprintManagement"
        meaning: "The single YAML file (.storyline/blueprint.yaml) that serves as the
          source of truth for the project's domain model, tech stack, bounded
          contexts, gaps, and questions. All pipeline agents read and write this
          file."
  Bounded Context:
    definitions:
      - context: "DomainModeling"
        meaning: "A logical grouping of related domain concepts with explicit
          boundaries, aggregates, events, commands, and relationships to other
          contexts."
  Feature File:
    definitions:
      - context: "Specification"
        meaning: "A .feature file in Gherkin format containing declarative
          Given/When/Then scenarios grouped by Rule, stored in
          .storyline/features/."
  Example Map:
    definitions:
      - context: "Discovery"
        meaning: "The structured output of a Three Amigos session, stored as
          .storyline/workbench/example-map.yaml, containing rules, examples,
          questions, and MoSCoW priorities."
  Persona Memory:
    definitions:
      - context: "Discovery"
        meaning: "Persistent markdown files in .storyline/personas/ where Three Amigos
          persona agents store accumulated project knowledge across sessions."
  Outside-in TDD:
    definitions:
      - context: "Implementation"
        meaning: "The London school TDD approach with a double loop: outer loop
          (acceptance test from Gherkin) stays red while inner loop (unit test,
          implement, refactor) cycles drive the design from outside in."
  The Foreman:
    definitions:
      - context: "Orchestration"
        meaning: "The pipeline entry point and build director skill. Detects project
          state, dispatches the right phase, and returns after The Onion to
          present the build choice."
  Three Amigos:
    definitions:
      - context: "Discovery"
        meaning: "A BDD discovery technique where Product, Developer, and Testing
          perspectives explore a feature together before specification. Supports
          quick scan (single AI) and full session (three parallel persona
          agents) modes."
  Mister Gherkin:
    definitions:
      - context: "Specification"
        meaning: "The BDD scenario formalization skill that converts Example Maps into
          structured .feature files with declarative Gherkin scenarios."
  Sticky Storm:
    definitions:
      - context: "DomainModeling"
        meaning: "The Event Storming agent (agents/sticky-storm.md) dispatched by The
          Foreman to discover domain events, commands, policies, and aggregates
          from Gherkin scenarios and write them into the blueprint."
  Doctor Context:
    definitions:
      - context: "DomainModeling"
        meaning: "The DDD modeling agent (agents/doctor-context.md) dispatched by The
          Foreman to refine bounded context boundaries, add invariants,
          relationships, and glossary terms. References ddd-patterns.md for
          strategic patterns."
  The Onion:
    definitions:
      - context: "Implementation"
        meaning: "The outside-in TDD implementation skill that plans and executes from
          acceptance tests inward, layer by layer."
  The Scout:
    definitions:
      - context: "Orchestration"
        meaning: "Phase 0 skill that reads the blueprint and captures feature ideas into
          the backlog. Fills tech_stack if empty. No longer does full codebase
          exploration — the blueprint is the source of truth."
  Surveyor:
    definitions:
      - context: "Orchestration"
        meaning: "A subagent that reverse-engineers an existing codebase into
          blueprint.yaml entries. Runs in full, incremental, or as-built mode."
  Scaffold:
    definitions:
      - context: "Implementation"
        meaning: "TypeScript module (scripts/scaffold.ts) that generates TypeScript or
          Python directory structure and skeleton files from the blueprint"
  Stamp:
    definitions:
      - context: "BlueprintManagement"
        meaning: "The operation of validating the blueprint then incrementing
          meta.version and updating meta.updated_at. Required before every git
          commit of blueprint.yaml."
  The Crew:
    definitions:
      - context: "Orchestration"
        meaning: "A build mode where the Three Amigos persona agents from the discovery
          session become implementation partners: Developer Amigo builds,
          Testing Amigo reviews, Product Amigo validates."
  Backlog:
    definitions:
      - context: "Orchestration"
        meaning: "Pre-pipeline feature ideas stored as individual markdown files in
          .storyline/backlog/. Each file contains the raw idea, initial context
          from the blueprint, and open questions."
  Hook:
    definitions:
      - context: "Orchestration"
        meaning: "Claude Code lifecycle hooks defined in hooks/hooks.json that run on
          SessionStart (install deps, show blueprint status), PostToolUse
          (auto-validate on blueprint edits), and SubagentStop (check persona
          memory updates for all five amigo types)."
  The Appraiser:
    definitions:
      - context: "Implementation"
        meaning: "Triangulated work estimation skill (skills/the-appraiser/) that
          dispatches three sub-agents in parallel (PERT, WBS, T-Shirt Sizing)
          and consolidates their results into a single estimation report. Reads
          plans from .storyline/plans/."
  Security Amigo:
    definitions:
      - context: "Discovery"
        meaning: "Security specialist agent (agents/security-amigo.md) that joins Three
          Amigos sessions when a feature touches auth, user input, sensitive
          data, or external APIs. Also performs post-build security audits. Has
          persistent persona memory."
  Frontend Amigo:
    definitions:
      - context: "Discovery"
        meaning: "UI/UX and frontend perspective agent (agents/frontend-amigo.md) that
          joins Three Amigos sessions when the project has a frontend framework
          in tech_stack. Analyzes component architecture, user interactions,
          accessibility, and design systems. Has persistent persona memory."
  Workbench:
    definitions:
      - context: "Orchestration"
        meaning: "The .storyline/workbench/ directory containing transient phase
          documents (example-map.yaml, events-raw.md, amigo-notes/, estimates/)
          that are replaced each pipeline run. Old versions live in git
          history."
  Plans:
    definitions:
      - context: "Implementation"
        meaning: "The .storyline/plans/ directory containing persistent dated
          implementation plan files (YYYY-MM-DD-<feature>.md). Each feature has
          its own plan file that survives across sessions. Multiple plans can
          coexist."
  Crew Roster:
    definitions:
      - context: "Discovery"
        meaning: "A list of active amigo agents included in every agent prompt during
          full session mode so each agent knows who else is participating. Built
          dynamically based on tech_stack and feature characteristics (always
          core three, optionally Frontend and Security)."

  Blueprint Summary:
    definitions:
      - context: BlueprintManagement
        meaning: A compact CLI-generated overview of the blueprint showing meta, tech
          stack, context names with descriptions, aggregate names,
          relationships, and glossary — used as default read for most agents
  Blueprint View:
    definitions:
      - context: BlueprintManagement
        meaning: A CLI-generated filtered view of a single bounded context including its
          full detail plus relationship targets and relevant glossary terms —
          used for targeted agent work
  Housekeeping:
    definitions:
      - context: Orchestration
        meaning: 'The mandatory final step of every pipeline phase: validate blueprint,
          stamp if valid, optionally clean up consumed workbench artifacts.
          Enforced via todo steps and PostToolUse hooks.'
  Changeset:
    definitions:
      - context: Implementation
        meaning: A structured YAML file (.storyline/changesets/CS-YYYY-MM-DD-slug.yaml)
          describing what to build or refactor against a specific blueprint
          version. Contains ordered phases with touches (add/modify/remove
          blueprint elements), migration strategies, and acceptance criteria.
          Replaces free-form Markdown plans.
  Phase:
    definitions:
      - context: Implementation
        meaning: One ordered step within a Changeset. Has a type (addition, refactor,
          migration, or removal), a touches block declaring which blueprint
          elements it affects, and acceptance criteria.
  Touches:
    definitions:
      - context: Implementation
        meaning: The structured declaration within a Phase of which blueprint elements
          are added, modified, or removed. Paths use bracket-notation
          (bounded_contexts[Name].aggregates[Name]...). Validated against the
          live blueprint during storyline changeset validate.
  Functional equivalence:
    definitions:
      - context: Implementation
        meaning: Same file paths, same class names, same directory structure —
          whitespace and comment wording may differ
  The Brief:
    definitions:
      - context: Discovery
        meaning: Standalone pipeline skill that runs a structured technical intake
          session. Produces technical-brief.yaml. Entry point for technical
          tasks that have no user story framing.
  technical-brief.yaml:
    definitions:
      - context: Discovery
        meaning: Schema-validated YAML artifact produced by The Brief. Contains task
          description, acceptance criteria, security_surface, and
          public_interface_change. Serves as the specification artifact for
          blueprint commands created by technical tasks, listed in
          feature_files.
  Scoped technical task:
    definitions:
      - context: Discovery
        meaning: A technical change with observable behavior or interface impact.
          Detected internally by The Brief. Runs NFR probe and MoSCoW in
          addition to core intake.
  Pure internal change:
    definitions:
      - context: Discovery
        meaning: "A technical change with no observable behavior or interface impact.
          Detected internally by The Brief. Uses a lightweight intake template:
          what changes, why, risks, done criteria."
  spec_type:
    definitions:
      - context: BlueprintManagement
        meaning: "Field on blueprint commands (values: gherkin or brief). Controls which
          artifact type is accepted in feature_files. brief allows a
          technical-brief.yaml reference; gherkin requires a .feature file."
  Minor tweak:
    definitions:
      - context: Orchestration
        meaning: A change that references existing behavior, introduces no new domain
          concepts, and is bounded to one command in the blueprint
  Implication scan:
    definitions:
      - context: Orchestration
        meaning: "Foreman pre-bypass check: reads feature files and blueprint to surface
          scenarios and commands affected by the described change"
  Lightweight path:
    definitions:
      - context: Orchestration
        meaning: "Pipeline bypass route: skip Three Amigos through Doctor Context and go
          directly to Developer Amigo execution with artifact reconciliation
          post-commit"
  Domain Model Delta:
    definitions:
      - context: DomainModeling
        meaning: Staged domain model entries (events, commands, invariants,
          relationships) held in the changeset until a scenario goes green, at
          which point The Onion applies them to blueprint.yaml incrementally
gaps:
  - id: "GAP-003"
    description: "No integration tests verifying the full pipeline flow from Foreman
      through all phases"
    severity: "nice_to_know"
    affects:
      - "Orchestration"
  - id: "GAP-004"
    description: "The Onion SKILL.md references a double-loop TDD workflow but there
      is no automated verification that implementation follows outside-in order"
    severity: "nice_to_know"
    affects:
      - "Implementation"
  - id: "GAP-005"
    description: "PostToolUse hook for blueprint auto-validation parses JSON from
      tool_input but error handling is minimal — malformed input could silently
      fail"
    severity: "nice_to_know"
    affects:
      - "BlueprintManagement"
  - id: "GAP-008"
    description: "bin/storyline relies on a node_modules symlink created by the
      SessionStart hook — if CLAUDE_PLUGIN_DATA is not set on first run, the
      symlink is not created and the CLI fails until the next session"
    severity: "nice_to_know"
    affects:
      - "BlueprintManagement"
  - id: GAP-009
    description: StartTechnicalTask and RunTechnicalBrief commands have no events
      modeled — TechnicalTaskStarted and TechnicalBriefProduced are expected but
      not yet in blueprint
    severity: important
    affects:
      - Orchestration
      - Discovery
  - id: GAP-010
    description: Phase names not formally enumerated in Orchestration invariants —
      Technical Brief phase needs to be added to a closed list before the
      single-active-phase invariant is enforceable
    severity: important
    affects:
      - Orchestration
  - id: GAP-011
    description: Test infrastructure for blueprint.ts spawns a child process per
      test case (npx tsx + spawnSync), making the full suite take ~9 minutes for
      64 tests. Consider in-process testing by importing blueprint functions
      directly, or running tsx once and invoking handlers in-memory.
    severity: nice_to_know
    affects:
      - BlueprintManagement
  - id: GAP-012
    description: add-command --spec-type flag is not documented in storyline summary
      output or CLAUDE.md CLI reference. Contributors reading storyline summary
      or the CLI help have no way to discover it exists.
    severity: nice_to_know
    affects:
      - BlueprintManagement
  - id: GAP-013
    description: "Feature file drift is the existential risk of this methodology.
      The plugin's whole promise is living documentation — feature files that
      accurately reflect system behavior at all times. The pipeline has weak
      drift prevention: the Surveyor runs as-built surveys but only when
      manually triggered, and nothing enforces that feature files are updated
      before or after a change. For refactors especially, behavior changes
      silently and the feature files become archaeology. If this is not solved,
      the blueprint becomes a lie and the methodology collapses into theatre.
      Needs a stronger enforcement mechanism — automated drift detection, a
      pre-commit hook, a mandatory as-built survey step, or a validation gate
      that warns when feature files have not been touched in N commits but
      source code has."
    severity: important
    affects:
      - Specification
  - id: GAP-014
    description: When a story is split and sub-stories run through the pre-build
      pipeline in sequence, amigo notes files (workbench/amigo-notes/*.md) get
      overwritten between stories — the second story destroys the first's notes
    severity: important
    affects:
      - Discovery
  - id: GAP-015
    description: The Surveyor leaves forward-references to feature files that don't
      exist yet in blueprint commands' feature_files[] — causes referential
      integrity errors when adding new commands until manually cleared
    severity: important
    affects:
      - BlueprintManagement
  - id: GAP-016
    description: "storyline stamp crashes when blueprint.yaml uses YAML compact flow
      style ([{name: X}]) — the YAML library can parse it but cannot
      re-serialize it, requiring manual editing of meta fields as a workaround"
    severity: critical
    affects:
      - BlueprintManagement
  - id: GAP-017
    description: "S8 implication scan procedure is underspecified: tells Foreman to
      search feature files for references but gives no search method (Grep by
      command name? Read each file? Blueprint view only?). Without explicit
      instruction the Foreman may read all files sequentially or skip the scan
      entirely."
    severity: important
    affects:
      - Orchestration
  - id: GAP-018
    description: "Implication scan error handling not implemented: if the scan fails
      (malformed feature file, missing blueprint context, CLI error), S8 has no
      fallback branch. Q-006 was left open in the changeset. Skill should
      surface the error and offer full pipeline as fallback."
    severity: important
    affects:
      - Orchestration
  - id: GAP-019
    description: No convention for marking a feature file as 'verified as-built' vs
      'planned but unverified'. Feature files written during pipeline phases and
      feature files discovered/verified during as-built surveys are
      indistinguishable. Future incremental surveys have no signal to detect
      drift between planned scenarios and actual implementation.
    severity: important
    affects:
      - Specification
  - id: GAP-020
    description: S1 routing (no blueprint, no source) dispatches Three Amigos
      directly without The Scout. tech_stack is empty when Three Amigos runs
      storyline summary — Discovery phase has no project context.
    severity: important
    affects:
      - Orchestration
  - id: GAP-021
    description: "No routing scenario covers: feature files exist +
      workbench/tech-choices.md exists + no changeset. The Onion is never
      dispatched on this path. User is left without guidance after Quartermaster
      completes."
    severity: important
    affects:
      - Orchestration
  - id: GAP-022
    description: S8 Step 4a 'execute inline' contradicts the Foreman hard rule NEVER
      explore codebase. Inline execution of a code change requires codebase
      context the Foreman is not allowed to read. Executor is unspecified.
    severity: critical
    affects:
      - Orchestration
  - id: GAP-023
    description: Changeset status field is never updated from 'draft' to 'complete'
      after a feature is built. Role 2 MCQ accumulates all changesets including
      completed ones — no lifecycle management.
    severity: important
    affects:
      - Implementation
  - id: GAP-024
    description: storyline archive is only called in crew-build-loop.md. The
      'Continue here' path (most common) never archives workbench artifacts.
      Workbench silently accumulates example-map.yaml, amigo-notes/,
      tech-choices.md across features.
    severity: important
    affects:
      - Orchestration
  - id: GAP-025
    description: example-map.yaml and amigo-notes/*.md are flat files with no
      per-feature namespacing. Starting a new feature overwrites the previous
      feature's discovery artifacts if archive was not called first.
    severity: important
    affects:
      - Discovery
  - id: GAP-026
    description: No recovery path for interrupted pipeline phases. If Three Amigos
      completes but Mister Gherkin never ran (session ended), the Foreman has no
      detection logic to identify this state and resume from the right phase.
    severity: important
    affects:
      - Orchestration
  - id: GAP-027
    description: storyline housekeeping CLI command exists but no skill or agent is
      instructed to call it. Cleanup is never triggered automatically.
    severity: nice_to_know
    affects:
      - BlueprintManagement

questions:
  - id: "Q-001"
    question: "Should skills/sticky-storm and skills/doctor-context exist as
      dedicated SKILL.md files instead of only agent .md files, given they are
      invoked as skills in the pipeline flow?"
    severity: "important"
    raised_during: "Surveyor"
    affects:
      - "DomainModeling"
    status: "resolved"
    answer: "They are agents only (agents/sticky-storm.md,
      agents/doctor-context.md), dispatched by The Foreman as subagents. No
      standalone skills needed."
    resolved_at: 2026-04-05T15:46:29.637Z
  - id: "Q-002"
    question: "Is the Security Amigo intended to be dispatched automatically by The
      Foreman for all features, or only when explicitly triggered by the user?"
    severity: "nice_to_know"
    raised_during: "Surveyor"
    affects:
      - "Orchestration"
    status: "open"
  - id: Q-003
    question: ExecuteTweakPath scenarios say artifact updates happen after the
      change is committed — this conflicts with the invariant that the blueprint
      must be validated and stamped before every commit. Is post-commit
      reconciliation a first-class exception to that invariant, or must artifact
      updates happen pre-commit?
    severity: critical
    raised_during: Sticky Storm
    affects:
      - Orchestration
    status: open
  - id: Q-004
    question: The user confirmation of the lightweight path is modeled as a scenario
      under IdentifyMinorTweak rather than a distinct command. Should
      ConfirmLightweightPath be a separate command so that the
      InitiateImplicationScanOnConfirmation policy has an unambiguous trigger,
      or is absorbing the confirmation into IdentifyMinorTweak sufficient?
    severity: important
    raised_during: Sticky Storm
    affects:
      - Orchestration
    status: open
  - id: Q-005
    question: "TweakRoutedToFullPipeline covers two distinct reasons: Foreman
      classification (change introduces new behavior) and user override (user
      rejects lightweight path). Should these be separate events so downstream
      policies can distinguish between an automated routing decision and a
      deliberate user choice?"
    severity: important
    raised_during: Sticky Storm
    affects:
      - Orchestration
    status: open
