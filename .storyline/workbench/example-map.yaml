feature: lightweight-tweak-path
story: "As a plugin user, when I describe a minor adjustment to an existing feature, I want The Foreman to recognize it as a small tweak and offer a lighter path, so that I skip the full discovery pipeline for trivial changes — but still see any implications for existing scenarios and the blueprint before proceeding."
session_date: 2026-04-06
codebase_context:
  relevant_contexts:
    - Orchestration   # Foreman routing lives here (PipelineSession aggregate)
  existing_commands:
    - context: Orchestration
      notes: "Current routing has S1-S7 scenarios. New route (S8 or modified S4a) needed for minor-tweak detection."

rules:
  - id: R1
    description: "Foreman classifies a request as a minor tweak based on observable signals: references existing named behavior, uses scoping language (just/small change/tweak/adjust/fix), introduces no new actors/use cases/domain events, scope bounded to ≤1 command or rule."
    moscow: must-have
    examples:
      - name: "Recognized tweak"
        context: "User says 'just update the error message on failed blueprint validation'"
        action: "Foreman reads the description"
        outcome: "Classifies as minor tweak, shows rationale to user"
      - name: "Not a tweak"
        context: "User says 'add multi-language support for error messages'"
        action: "Foreman reads the description"
        outcome: "Routes to full pipeline (Three Amigos)"
      - name: "Ambiguous — fallback to clarification"
        context: "User says 'fix the validation'"
        action: "Foreman cannot determine scope"
        outcome: "Clarifying MCQ, not auto-classified as tweak"

  - id: R2
    description: "User must confirm before pipeline is bypassed. Foreman shows the classification rationale and offers 'run full pipeline instead' as an escape hatch."
    moscow: must-have
    examples:
      - name: "Correct classification, confirmed"
        context: "Foreman correctly identifies a tweak"
        action: "User confirms lightweight path"
        outcome: "Lightweight path proceeds"
      - name: "Misclassified, overridden"
        context: "Foreman misclassifies a real feature as a tweak"
        action: "User selects 'Run full pipeline instead'"
        outcome: "Routes to Three Amigos as normal"

  - id: R3
    description: "Implication scan runs before bypass is finalized. Foreman reads .storyline/features/ and blueprint commands/invariants. Reports: affected feature files, affected commands/events."
    moscow: must-have
    examples:
      - name: "Clean tweak — no implications"
        context: "No feature files reference the changed behavior"
        action: "Scan runs"
        outcome: "'No implications found — safe to proceed lightly'"
      - name: "Implications found"
        context: "2 scenarios reference the rule being changed"
        action: "Scan runs"
        outcome: "Foreman lists affected files and scenarios"

  - id: R4
    description: "Cross-context implication blocks the lightweight path. Any implication that touches more than one bounded context forces full pipeline. Single-context implications (≤3 scenarios) can proceed lightly."
    moscow: must-have
    examples:
      - name: "Single-context implications — proceed"
        context: "2 scenarios in one context affected"
        action: "Scan returns single-context results"
        outcome: "MCQ: proceed lightly (update those scenarios too) or full pipeline"
      - name: "Cross-context — blocked"
        context: "Scan finds implications across Orchestration and Discovery"
        action: "Scan detects multi-context impact"
        outcome: "Lightweight path blocked. Foreman recommends full pipeline."

  - id: R5
    description: "Lightweight execution: Foreman dispatches Developer Amigo with tweak details + implication scan results. Developer Amigo makes the change and commits. Post-commit: Developer Amigo (or Surveyor) updates affected feature files and blueprint. Exception: inline execution if main session already has sufficient context."
    moscow: must-have
    examples:
      - name: "Delegate to Developer Amigo"
        context: "Implication scan passes, user confirms"
        action: "Foreman dispatches Developer Amigo"
        outcome: "Change made, committed, feature files and blueprint updated"
      - name: "Inline execution"
        context: "Main session already explored the area (session has context)"
        action: "Foreman executes inline without dispatching agent"
        outcome: "Same result — change committed, artifacts updated"

questions:
  - id: Q1
    question: "What is the exact threshold for 'scope bounded to ≤1 command or rule' in R1? Is counting commands in the blueprint the right metric?"
    severity: important
    who_can_answer: internal
    best_guess: "Count blueprint commands touched by the described change. If >1 command affected, not a tweak."

  - id: Q2
    question: "When post-commit feature file update is needed, is a lightweight edit (update existing scenario text) always sufficient, or might a full Mister Gherkin pass be needed?"
    severity: important
    who_can_answer: internal
    best_guess: "Lightweight edit is sufficient if only wording/value changes. New scenarios needed only if behavior changed — that implies it wasn't a tweak (R1 should have caught it)."

assumptions:
  - id: A1
    assumption: "Detection is purely language/heuristic-based in the Foreman prompt — no code scanning"
    confidence: high
    consequence_if_wrong: "n/a"
  - id: A2
    assumption: "Implication scan only reads .storyline/features/ and blueprint — no src/ exploration needed"
    confidence: high
    consequence_if_wrong: "Code-level implications (e.g., type changes) missed"
  - id: A3
    assumption: "Developer Amigo can execute correctly from Foreman's description + scan results alone"
    confidence: medium
    consequence_if_wrong: "Agent needs more context and may make incorrect change"
  - id: A4
    assumption: "Post-commit feature/blueprint updates are mechanical edits, not full re-specification"
    confidence: medium
    consequence_if_wrong: "Mister Gherkin pass needed, which negates the lightweight benefit"

glossary_candidates:
  - term: "Minor tweak"
    definition: "A change that references existing behavior, introduces no new domain concepts, and is bounded to ≤1 command in the blueprint"
  - term: "Implication scan"
    definition: "Foreman's pre-bypass check: reads feature files and blueprint to surface scenarios and commands affected by the described change"
  - term: "Lightweight path"
    definition: "The pipeline bypass route: skip Three Amigos, Mister Gherkin, Sticky Storm, Doctor Context — go directly to Developer Amigo execution with artifact reconciliation post-commit"

risks:
  - "Detection heuristic false positive: real feature bypasses pipeline — mitigated by R2 (user confirmation)"
  - "A2 miss: code-level implication not caught by blueprint+feature scan — accepted risk for this story"
  - "A4 failure: post-commit artifact reconciliation requires more than a mechanical edit — falls back to Mister Gherkin"
